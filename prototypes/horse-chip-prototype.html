<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Horse Chip Prototype</title>
<style>
body { font-family: 'Courier New', monospace; background: #f5ead6; padding: 40px 40px 80px; max-width: 1100px; }
h2 { color: #5a3a1a; font-size: 14px; text-transform: uppercase; letter-spacing: .08em; margin: 40px 0 12px; border-bottom: 1px solid #c4a96b; padding-bottom: 4px; }
.row { display: flex; flex-wrap: wrap; gap: 36px; align-items: center; padding: 48px 28px 36px; background: #faf5e9; border: 1px solid #d4c090; border-radius: 4px; }
.note { font: italic 11px 'Courier New', monospace; color: #8a7050; margin-top: 8px; }

.bay       { --bg: #7a3520; --fg: #f5ecd7; }
.black     { --bg: #1c1c1c; --fg: #e8d5b0; }
.grey      { --bg: #7a7a7a; --fg: #f0ead6; }
.chestnut  { --bg: #8b3a1f; --fg: #fae8c8; }
.palomino  { --bg: #c8961a; --fg: #2a1800; }
.greywhite { --bg: #c8bfaa; --fg: #1c1008; }
.liver     { --bg: #4a2812; --fg: #ead8b8; }
.roan      { --bg: #8a6a5a; --fg: #f0e4d0; }

.oc {
  position: relative;
  display: inline-flex; align-items: center;
  font: 700 12px 'Courier New', monospace;
  white-space: nowrap; cursor: grab; user-select: none;
  background: var(--bg); color: var(--fg);
  box-shadow: 2px 2px 5px rgba(0,0,0,.3);
  border-radius: 2px;
  overflow: visible;
  padding: 5px 14px 5px 16px;
}
.oc::before {
  content: '♞';
  position: absolute;
  color: var(--bg);
  font-size: 32px;
  line-height: 1;
  left: -4px;
  top: -20px;
}

/* rev: horse faces right — head and tail swap sides */
.oc.rev::before { left: auto; right: -4px; transform: scaleX(-1); }
.oc.rev::after  { right: auto; left: -10px; transform: translateY(-50%) scaleY(-1) scaleX(-1); }

.oc::after {
  content: '∫';
  position: absolute;
  color: var(--bg);
  font-size: 22px;
  line-height: 1;
  right: -10px;
  top: 50%;
  transform: translateY(-50%) scaleY(-1);
}
.oc .legs {
  position: absolute;
  bottom: -6px; left: 0; right: 0; height: 6px;
  pointer-events: none;
  background:
    linear-gradient(var(--bg),var(--bg))  4px 0 / 2px 100% no-repeat,
    linear-gradient(var(--bg),var(--bg)) 10px 0 / 2px 100% no-repeat,
    linear-gradient(var(--bg),var(--bg)) calc(100% - 10px) 0 / 2px 100% no-repeat,
    linear-gradient(var(--bg),var(--bg)) calc(100% -  4px) 0 / 2px 100% no-repeat;
}
</style>
</head>
<body>

<h1 style="font:700 18px Georgia,serif;color:#3a2010;margin:0 0 24px">Horse Chip — 32px · −4px</h1>

<h2>Full coat set</h2>
<div class="row" id="row-coats">
  <span class="oc bay"       style="transform:rotate(-1.8deg)"><span class="legs"></span>Secretariat</span>
  <span class="oc black"     style="transform:rotate( 1.2deg)"><span class="legs"></span>Black Beauty</span>
  <span class="oc chestnut"  style="transform:rotate( 1.5deg)"><span class="legs"></span>Trigger</span>
  <span class="oc palomino"  style="transform:rotate(-1.1deg)"><span class="legs"></span>Mister Ed</span>
  <span class="oc grey"      style="transform:rotate(-0.7deg)"><span class="legs"></span>Dapple</span>
  <span class="oc greywhite" style="transform:rotate( 0.6deg)"><span class="legs"></span>Lipizzaner</span>
  <span class="oc liver"     style="transform:rotate(-1.4deg)"><span class="legs"></span>Shadowfax</span>
  <span class="oc roan"      style="transform:rotate( 0.9deg)"><span class="legs"></span>Ro</span>
  <span class="oc bay"       style="transform:rotate( 1.3deg)"><span class="legs"></span>Northern Dancer</span>
  <span class="oc chestnut"  style="transform:rotate(-0.9deg)"><span class="legs"></span>Affirmed</span>
  <span class="oc black"     style="transform:rotate( 0.5deg)"><span class="legs"></span>Man o' War</span>
  <span class="oc palomino"  style="transform:rotate(-1.6deg)"><span class="legs"></span>Seabiscuit</span>
</div>

<h2>Scaling — short to long, random</h2>
<div class="row" id="row-scale">
  <span class="oc bay" style="transform:rotate(-1deg)"><span class="legs"></span>Ed</span>
  <span class="oc bay" style="transform:rotate( 1deg)"><span class="legs"></span>Trigger</span>
  <span class="oc bay" style="transform:rotate(-0.5deg)"><span class="legs"></span>Secretariat</span>
  <span class="oc bay" style="transform:rotate( 1.5deg)"><span class="legs"></span>Northern Dancer</span>
  <span class="oc bay" style="transform:rotate(-1.2deg)"><span class="legs"></span>Dr Fager's Pride</span>
</div>

<script>
document.querySelectorAll('#row-coats .oc, #row-scale .oc').forEach(el => {
  if (Math.random() > 0.5) el.classList.add('rev');
});
</script>
</body>
</html>
