{% extends "base.html" %}
{% block title %}{{ title }} — poet.horse{% endblock %}

{% block content %}
<div class="text-page coming-soon-page">
  <p class="coming-soon-eyebrow">Coming soon</p>
  <h1>{{ title }}</h1>
  <p class="coming-soon-desc">{{ description }}</p>
  <p class="coming-soon-ref">Roadmap task {{ roadmap_task }}.</p>
  <p class="coming-soon-back">
    <a href="{{ url_for('count') }}">&larr; back to the counter</a>
    &middot;
    <a href="{{ url_for('poetry_editor') }}">write a poem</a>
  </p>
</div>
{% endblock %}
